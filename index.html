<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Haidian Hidden Library</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
    }

    #screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      color: white;
      background: #000;
    }

    .topbar {
      position: absolute;
      top: 28px;
      left: 40px;
      right: 40px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 2px 4px #000;
    }

    #slides {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s linear;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide.no-image {
      background: #071827;
    }

    .content {
      position: absolute;
      left: 6vw;
      bottom: 12vh;
      z-index: 25;
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 24px 32px;
      border-radius: 14px;
      box-sizing: border-box;
      max-width: 50vw;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 20px;
      letter-spacing: 1.5px;
    }

    .badge-post { background: #008ba3; color: #fff; }
    .badge-breaking { background: #d32f2f; color: #fff; }
    .badge-volunteer { background: #f57c00; color: #fff; }
    .badge-student { background: #388e3c; color: #fff; }

    h1 {
      font-size: 34px;
      line-height: 1.3;
      margin: 0 0 10px;
      font-weight: 900;
    }

    .subtitle {
      font-size: 20px;
      line-height: 1.5;
      color: #e0e0e0;
    }

    .name-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }

    .name-chip {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 10px 28px 10px 20px;
      border-radius: 10px;
      font-size: 26px;
      font-weight: 700;
      color: #ffffff;
      display: flex;
      align-items: center;
      width: fit-content;
    }

    .name-chip .icon {
      width: 38px;
      min-width: 38px;
      margin-right: 18px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
    }

    .class-prefix {
      font-size: 0.85em;
      opacity: 0.75;
      margin-right: 14px;
      font-weight: 500;
    }

    .quote {
      font-size: 22px;
      line-height: 1.5;
      font-weight: 500;
      color: #f5f5f5;
      border-left: 4px solid #ff9800;
      padding-left: 16px;
      margin-top: 10px;
      font-style: italic;
    }

    .quote-student {
      border-left-color: #4caf50;
    }

    #marqueeWrap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 18px;
      height: 52px;
      z-index: 30;
      background: rgba(0,0,0,.9);
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,.15);
      box-sizing: border-box;
    }

    #marquee {
      position: absolute;
      top: 0;
      left: 0;
      height: 52px;
      line-height: 52px;
      white-space: nowrap;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      padding-left: 100vw;
      animation: marqueeMove 36s linear infinite;
    }

    @keyframes marqueeMove {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-100%);
      }
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      box-sizing: border-box;
      padding: 70px;
      font-size: 40px;
      line-height: 1.6;
      text-align: center;
      background: #111;
    }
  </style>
</head>

<body>
  <div id="screen">
    <div class="topbar">
      <div>海佃地下圖書室</div>
      <div id="clock"></div>
    </div>

    <div id="slides"></div>

    <div id="marqueeWrap">
      <div id="marquee">Hidden below, growing beyond.</div>
    </div>
  </div>

  <script>
    const GAS_API_URL = 'https://script.google.com/a/macros/go.edu.tw/s/AKfycbwSAYrzs4Mc9oEGnJYFqd-bOZ8PJ3dYrXdutp5b3TniGzWt56uYXLiRDRFPGe-7n_lN/exec';

    let rawData = { slides: [], volunteers: [], studentVols: [], marquee: '' };
    let currentSlides = [];
    let currentVolsCache = '';
    let current = 0;
    let timer = null;

    let serverTimeBase = Date.now();
    let localTimeAtSync = performance.now();

    function getAccurateTime() {
      return new Date(serverTimeBase + (performance.now() - localTimeAtSync));
    }

    function loadData() {
      const oldScript = document.getElementById('jsonpScript');
      if (oldScript) oldScript.remove();

      const script = document.createElement('script');
      script.id = 'jsonpScript';
      script.src = GAS_API_URL + '?callback=handleData&t=' + Date.now();
      document.body.appendChild(script);
    }

    function handleData(data) {
      if (data.serverTime) {
        serverTimeBase = data.serverTime;
        localTimeAtSync = performance.now();
      }

      rawData.slides = data.slides || [];
      rawData.volunteers = data.volunteers || [];
      rawData.studentVols = data.studentVols || [];

      setMarquee(data.marquee || 'Hidden below, growing beyond.');
      checkAndRebuildSlides(true);
    }

    function setMarquee(text) {
      const marquee = document.getElementById('marquee');
      marquee.style.animation = 'none';
      marquee.textContent = text;

      setTimeout(function () {
        marquee.style.animation = 'marqueeMove 36s linear infinite';
      }, 50);
    }

    function checkAndRebuildSlides(forceRebuild) {
      if (!rawData.slides.length && !rawData.volunteers.length && !rawData.studentVols.length) return;

      const now = getAccurateTime();
      const day = now.getDay();
      const mins = now.getHours() * 60 + now.getMinutes();

      const activeVols = rawData.volunteers.filter(v =>
        v.dayOfWeek === day && mins >= v.startMins && mins <= v.endMins
      );

      const activeStudents = rawData.studentVols.filter(v => v.dayOfWeek === day);

      const volSignature = JSON.stringify(activeVols) + JSON.stringify(activeStudents);

      if (!forceRebuild && volSignature === currentVolsCache) return;

      currentVolsCache = volSignature;

      const posts = rawData.slides.filter(s => s.type === 'post');
      const breaking = rawData.slides.filter(s => s.type === 'breaking');

      const formattedVols = activeVols.map(v => ({
        type: 'volunteer',
        title: v.name,
        subtitle: v.phrase,
        image: v.image,
        duration: v.duration
      }));

      const formattedStudents = activeStudents.map(v => ({
        type: 'studentVol',
        title: v.name,
        classStr: v.classStr,
        subtitle: v.phrase || '圖書室小志工，為您服務！',
        image: v.image,
        duration: v.duration
      }));

      currentSlides = [...breaking, ...posts, ...formattedVols, ...formattedStudents];

      if (current >= currentSlides.length) current = 0;

      renderSlides();

      const els = document.querySelectorAll('.slide');
      els.forEach(el => el.classList.remove('active'));

      if (els[current]) els[current].classList.add('active');

      if (!timer) play();
    }

    function renderSlides() {
      const box = document.getElementById('slides');

      if (!currentSlides.length) {
        box.innerHTML = '<div class="empty">目前沒有可播放的消息<br>請確認 Google 試算表資料</div>';
        return;
      }

      box.innerHTML = currentSlides.map(function(s) {
        const hasImage = !!s.image;
        const bg = hasImage ? "background-image:url('" + escapeAttr(s.image) + "')" : "";

        let badgeText = '圖書室消息';
        let badgeClass = 'badge-post';
        let bodyHtml = '';

        if (s.type === 'breaking') {
          badgeText = '號外插播';
          badgeClass = 'badge-breaking';
        } else if (s.type === 'volunteer') {
          badgeText = '今日值班志工';
          badgeClass = 'badge-volunteer';
        } else if (s.type === 'studentVol') {
          badgeText = '今日小志工';
          badgeClass = 'badge-student';
        }

        if (s.type === 'volunteer' || s.type === 'studentVol') {
          const names = String(s.title).split(/[\n、,，]+/).map(n => n.trim()).filter(Boolean);

          const iconHtml = s.type === 'volunteer'
            ? '<i class="fa-solid fa-hand-holding-heart" style="color:#ffb74d;"></i>'
            : '<i class="fa-solid fa-book-reader" style="color:#81c784;"></i>';

          const chips = names.map(n => {
            const classPrefix = (s.type === 'studentVol' && s.classStr)
              ? `<span class="class-prefix">${escapeHtml(s.classStr)}</span>`
              : '';

            return `
              <div class="name-chip">
                <span class="icon">${iconHtml}</span>
                ${classPrefix}
                <span>${escapeHtml(n)}</span>
              </div>
            `;
          }).join('');

          const quoteClass = s.type === 'studentVol' ? 'quote-student' : '';

          bodyHtml = `
            <div class="name-grid">${chips}</div>
            ${s.subtitle ? `<div class="quote ${quoteClass}">${escapeHtml(s.subtitle)}</div>` : ''}
          `;
        } else {
          bodyHtml = `
            <h1>${escapeHtml(s.title)}</h1>
            <div class="subtitle">${escapeHtml(s.subtitle || '')}</div>
          `;
        }

        return `
          <div class="slide ${hasImage ? '' : 'no-image'}" style="${bg}">
            <div class="content">
              <div class="badge ${badgeClass}">${badgeText}</div>
              ${bodyHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    function play() {
      clearTimeout(timer);
      timer = null;

      if (!currentSlides.length) return;

      const els = document.querySelectorAll('.slide');
      els.forEach(el => el.classList.remove('active'));

      if (!els[current]) current = 0;
      els[current].classList.add('active');

      const duration = Number(currentSlides[current].duration || 12) * 1000;

      timer = setTimeout(function() {
        current = (current + 1) % currentSlides.length;
        play();
      }, duration);
    }

    function updateClock() {
      const now = getAccurateTime();

      document.getElementById('clock').textContent =
        now.toLocaleString('zh-TW', {
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });

      checkAndRebuildSlides(false);
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(str) {
      return String(str || '')
        .replace(/'/g, '%27')
        .replace(/"/g, '%22');
    }

    updateClock();
    loadData();

    setInterval(updateClock, 10000);
    setInterval(loadData, 300 * 1000);

    setInterval(function() {
      location.href = location.pathname + '?t=' + Date.now();
    }, 10 * 60 * 1000);
  </script>
</body>
</html>
