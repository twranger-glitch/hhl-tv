<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Haidian Hidden Library</title>

  @import url('[https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap](https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap)');
  
  <link rel="stylesheet" href="[https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0](https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0)" />

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    #screen {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      color: white;
      background: #000;
    }

    .topbar {
      position: absolute;
      top: 28px;
      left: 40px;
      right: 40px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.8);
    }

    #slides {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1s ease;
      background-color: #000;
      -webkit-transform: translate3d(0,0,0);
      transform: translate3d(0,0,0);
      will-change: opacity;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide-media {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    video.slide-media {
      object-fit: contain; 
      background-color: #000;
    }

    .slide-bg-img {
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }

    .slide.no-image {
      background: linear-gradient(135deg, #263238, #1565c0);
    }

    .content {
      position: absolute;
      left: 6vw;
      bottom: 11vh;
      z-index: 25;
      background: rgba(0,0,0,.68);
      padding: 14px 18px 16px;
      border-radius: 12px;
      box-sizing: border-box;
      max-width: 46vw;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease;
    }

    .slide.active .content {
      opacity: 1;
      transform: translateY(0);
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: 1px;
      background: #00bcd4;
      color: #fff;
    }

    .badge-breaking { background: #d32f2f; }
    .badge-volunteer { background: #f57c00; }
    .badge-student { background: #388e3c; }

    h1 {
      font-size: 30px;
      line-height: 1.25;
      margin: 0 0 6px;
      font-weight: 900;
    }

    .subtitle {
      font-size: 20px;
      line-height: 1.35;
      font-weight: 500;
      opacity: .92;
    }

    .name-grid {
      display: block;
      margin-bottom: 12px;
    }

    .name-chip {
      margin-bottom: 10px;
      padding: 8px 18px 8px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.18);
      font-size: 26px;
      font-weight: 800;
      line-height: 1.3;
      white-space: nowrap;
      display: -webkit-flex; 
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      width: fit-content;
    }

    .material-icons {
      font-family: 'Material Icons';
      font-weight: normal;
      font-style: normal;
      font-size: 32px;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      margin-right: 14px;
    }

    .class-prefix {
      display: inline-block;
      margin-right: 14px;
      font-size: 22px;
      opacity: .8;
      font-weight: 700;
    }

    .quote {
      font-size: 22px;
      line-height: 1.45;
      font-weight: 500;
      color: #f5f5f5;
      border-left: 4px solid #ff9800;
      padding-left: 14px;
      margin-top: 8px;
    }

    .quote-student { border-left-color: #4caf50; }

    #marqueeWrap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      height: 64px; 
      z-index: 30;
      background: rgba(0,0,0,.86);
      overflow: hidden;
      display: flex;
      align-items: center;
      border-top: 2px solid rgba(255,255,255,.25);
      -webkit-transform: translate3d(0,0,0);
      transform: translate3d(0,0,0);
    }

    #marquee {
      white-space: nowrap;
      font-size: 30px;
      font-weight: 800;
      padding-left: 100%;
      line-height: normal;
      -webkit-font-smoothing: antialiased;
      will-change: -webkit-transform, transform;
      -webkit-transform: translate3d(0,0,0);
      animation: marquee 30s linear infinite;
    }

    @keyframes marquee {
      from { -webkit-transform: translate3d(0, 0, 0); transform: translate3d(0, 0, 0); }
      to { -webkit-transform: translate3d(-100%, 0, 0); transform: translate3d(-100%, 0, 0); }
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      box-sizing: border-box;
      padding: 70px;
      font-size: 48px;
      line-height: 1.6;
      text-align: center;
      background: linear-gradient(135deg, #263238, #1565c0);
    }
  </style>
</head>

<body>
  <div id="screen">
    <div class="topbar">
      <div>海佃地下圖書室</div>
      <div id="clock"></div>
    </div>

    <div id="slides"></div>

    <div id="marqueeWrap">
      <div id="marquee">Hidden below, growing beyond.</div>
    </div>
  </div>

  <script>
    var GAS_API_URL = '[https://script.google.com/a/macros/go.edu.tw/s/AKfycbwSAYrzs4Mc9oEGnJYFqd-bOZ8PJ3dYrXdutp5b3TniGzWt56uYXLiRDRFPGe-7n_lN/exec](https://script.google.com/a/macros/go.edu.tw/s/AKfycbwSAYrzs4Mc9oEGnJYFqd-bOZ8PJ3dYrXdutp5b3TniGzWt56uYXLiRDRFPGe-7n_lN/exec)';

    var rawData = {
      slides: [],
      volunteers: [],
      studentVols: [],
      marquee: ''
    };

    var slides = [];
    var current = 0;
    var timer = null;
    var rawDataCacheString = '';

    function loadData() {
      var oldScript = document.getElementById('jsonpScript');
      if (oldScript) {
        oldScript.parentNode.removeChild(oldScript);
      }

      var script = document.createElement('script');
      script.id = 'jsonpScript';
      script.src = GAS_API_URL + '?callback=handleData&t=' + new Date().getTime();
      document.body.appendChild(script);
    }

    function handleData(data) {
      var newDataString = JSON.stringify(data);
      if (rawDataCacheString === newDataString) {
        return; 
      }
      rawDataCacheString = newDataString; 

      rawData.slides = data.slides || [];
      rawData.volunteers = data.volunteers || [];
      rawData.studentVols = data.studentVols || [];
      rawData.marquee = data.marquee || 'Hidden below, growing beyond.';

      document.getElementById('marquee').textContent = rawData.marquee;

      buildSlides();

      if (current >= slides.length) {
        current = 0;
      }

      renderSlides();
      play();
    }

    function buildSlides() {
      var now = new Date();
      var day = now.getDay();
      var mins = now.getHours() * 60 + now.getMinutes();

      var rawSlides = rawData.slides || [];
      var breakingNews = [];
      var posts = [];

      for (var i = 0; i < rawSlides.length; i++) {
        if (rawSlides[i].type === 'breaking') {
          breakingNews.push(rawSlides[i]);
        } else {
          posts.push(rawSlides[i]);
        }
      }

      var mixedSlides = [];

      if (breakingNews.length > 0 && posts.length > 0) {
        var breakIndex = 0;
        for (var p = 0; p < posts.length; p++) {
          mixedSlides.push(posts[p]);
          mixedSlides.push(breakingNews[breakIndex % breakingNews.length]);
          breakIndex++;
        }
      } else {
        mixedSlides = rawSlides.slice(0);
      }

      var activeVols = [];
      for (var v = 0; v < rawData.volunteers.length; v++) {
        var item = rawData.volunteers[v];
        if (item.dayOfWeek === day && mins >= item.startMins && mins <= item.endMins) {
          activeVols.push({
            type: 'volunteer',
            title: item.name,
            subtitle: item.phrase,
            image: item.image,
            duration: item.duration
          });
        }
      }

      var activeStudents = [];
      for (var s = 0; s < rawData.studentVols.length; s++) {
        var stu = rawData.studentVols[s];
        if (stu.dayOfWeek === day) {
          activeStudents.push({
            type: 'studentVol',
            title: stu.name,
            classStr: stu.classStr,
            subtitle: stu.phrase || '圖書室小志工，為您服務！',
            image: stu.image,
            duration: stu.duration
          });
        }
      }

      slides = mixedSlides.concat(activeVols).concat(activeStudents);
    }

    function renderSlides() {
      var box = document.getElementById('slides');

      if (!slides.length) {
        box.innerHTML = '<div class="empty">目前沒有可播放的圖書室消息<br>請確認 Google 試算表資料</div>';
        return;
      }

      var html = '';

      for (var i = 0; i < slides.length; i++) {
        var item = slides[i];
        var hasImage = !!item.image;
        var isVideo = hasImage && item.image.toLowerCase().indexOf('.mp4') > -1;
        
        var mediaHtml = '';
        if (isVideo) {
          // 📺 防呆升級：強制指定 type="video/mp4"，讓電視不用猜格式
          mediaHtml = '<video class="slide-media" data-src="' + escapeAttr(item.image) + '" muted playsinline webkit-playsinline preload="none"><source type="video/mp4" src="' + escapeAttr(item.image) + '"></video>';
        } else if (hasImage) {
          mediaHtml = '<div class="slide-media slide-bg-img" style="background-image:url(\'' + escapeAttr(item.image) + '\')"></div>';
        }

        var badgeText = '圖書室消息';
        var badgeClass = '';

        if (item.type === 'breaking') {
          badgeText = '號外插播';
          badgeClass = 'badge-breaking';
        } else if (item.type === 'volunteer') {
          badgeText = '今日值班志工';
          badgeClass = 'badge-volunteer';
        } else if (item.type === 'studentVol') {
          badgeText = '今日小志工';
          badgeClass = 'badge-student';
        }

        var bodyHtml = '';

        if (item.type === 'volunteer' || item.type === 'studentVol') {
          var names = String(item.title || '').split(/[\n、,，]+/);
          var chips = '';

          for (var n = 0; n < names.length; n++) {
            var name = trimText(names[n]);
            if (!name) continue;

            var iconCode = item.type === 'volunteer' ? '&#xeaf3;' : '&#xe54b;';
            var iconColor = item.type === 'volunteer' ? '#ffb74d' : '#81c784';
            
            var classText = '';
            if (item.type === 'studentVol' && item.classStr) {
              classText = '<span class="class-prefix">' + escapeHtml(item.classStr) + '</span>';
            }

            chips +=
              '<div class="name-chip">' +
                '<span class="material-icons" style="color:' + iconColor + ';">' + iconCode + '</span>' +
                classText +
                '<span>' + escapeHtml(name) + '</span>' +
              '</div>';
          }

          var quoteClass = item.type === 'studentVol' ? ' quote-student' : '';
          bodyHtml =
            '<div class="name-grid">' + chips + '</div>' +
            (item.subtitle ? '<div class="quote' + quoteClass + '">' + escapeHtml(item.subtitle) + '</div>' : '');
        } else {
          if(trimText(item.title) !== "") {
              bodyHtml =
                '<h1>' + escapeHtml(item.title) + '</h1>' +
                '<div class="subtitle">' + escapeHtml(item.subtitle || '') + '</div>';
          }
        }

        var contentBoxHtml = bodyHtml !== '' 
          ? '<div class="content"><div class="badge ' + badgeClass + '">' + badgeText + '</div>' + bodyHtml + '</div>' 
          : '';

        html +=
          '<div class="slide ' + (hasImage ? '' : 'no-image') + '">' +
            mediaHtml +
            contentBoxHtml +
          '</div>';
      }

      box.innerHTML = html;
    }

    function nextSlide() {
      current = (current + 1) % slides.length;
      play();
    }

    function play() {
      clearTimeout(timer);
      timer = null;

      if (!slides.length) return;

      var els = document.querySelectorAll('.slide');

      for (var i = 0; i < els.length; i++) {
        els[i].classList.remove('active');
        var v = els[i].querySelector('video');
        if (v && v.src) {
          v.pause();
          v.removeAttribute('src'); 
          v.load(); 
        }
      }

      if (!els[current]) {
        current = 0;
      }

      var activeSlide = els[current];
      activeSlide.classList.add('active');

      var duration = Number(slides[current].duration || 12) * 1000;
      var videoEl = activeSlide.querySelector('video');

      if (videoEl) {
        var videoSrc = videoEl.getAttribute('data-src');
        videoEl.src = videoSrc;
        // 同時更新 source 標籤，確保電視讀得到
        var sourceEl = videoEl.querySelector('source');
        if(sourceEl) sourceEl.src = videoSrc;
        
        videoEl.load();
        
        // 設定防呆：如果電視卡住 30 秒都播不出來，強制換下一張，不准黑屏
        timer = setTimeout(nextSlide, 30000); 

        // 📺 關鍵修復：給電視 0.5 秒的喘息時間，等硬體解碼器就緒再下令播放
        setTimeout(function() {
          var playPromise = videoEl.play();
          if (playPromise !== undefined) {
            playPromise.catch(function(error) {
              console.log("Play failed, skipping...", error);
              clearTimeout(timer);
              timer = setTimeout(nextSlide, duration); // 播放失敗當作圖片切換
            });
          }
        }, 500);
        
        videoEl.onloadedmetadata = function() {
           clearTimeout(timer); 
           var safeTime = (videoEl.duration * 1000) + 2000; 
           if (!safeTime || isNaN(safeTime) || safeTime === Infinity) {
             safeTime = 30000; 
           }
           timer = setTimeout(nextSlide, safeTime);
        };
        
        videoEl.onended = function() {
          nextSlide();
        };

        videoEl.onerror = function() {
          clearTimeout(timer);
          nextSlide();
        };
      } else {
        timer = setTimeout(nextSlide, duration);
      }
    }

    function updateClock() {
      var now = new Date();

      document.getElementById('clock').textContent =
        now.toLocaleString('zh-TW', {
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(str) {
      return String(str || '')
        .replace(/'/g, '%27')
        .replace(/"/g, '%22');
    }

    function trimText(str) {
      return String(str || '').replace(/^\s+|\s+$/g, '');
    }

    updateClock();
    setInterval(updateClock, 10000);

    loadData();
    setInterval(loadData, 30 * 1000);

    setInterval(function() {
      location.reload();
    }, 60 * 60 * 1000);
  </script>
</body>
